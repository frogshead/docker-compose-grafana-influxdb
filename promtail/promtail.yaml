server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # SSH / Auth logs
  - job_name: auth
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth
          host: ${HOSTNAME}
          __path__: /var/log/auth.log

    pipeline_stages:
      # Extract sshd specific logs
      - match:
          selector: '{job="auth"}'
          stages:
            - regex:
                expression: '(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+(?P<service>\S+?)(\[(?P<pid>\d+)\])?:\s+(?P<message>.*)'
            - labels:
                service:
                hostname:
            - timestamp:
                source: timestamp
                format: "Jan _2 15:04:05"

  # Syslog
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: ${HOSTNAME}
          __path__: /var/log/syslog

    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+(?P<service>\S+?)(\[(?P<pid>\d+)\])?:\s+(?P<message>.*)'
      - labels:
          service:
          hostname:

  # Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only keep containers from our compose project
      - source_labels: ['__meta_docker_container_name']
        regex: '/(influxdb|influxdb3|grafana|loki|mosquitto|telegraf|promtail)'
        action: keep
      # Use container name as the job label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # Add container ID
      - source_labels: ['__meta_docker_container_id']
        target_label: container_id
      # Add image name
      - source_labels: ['__meta_docker_container_image']
        target_label: image
      # Set job label
      - replacement: docker
        target_label: job
    pipeline_stages:
      # Try to parse JSON logs (common for many containers)
      - json:
          expressions:
            log: log
            stream: stream
            time: time
            level: level
            msg: msg
            message: message
      # Extract level from common log formats
      - regex:
          expression: '(?i)(?P<level>debug|info|warn|warning|error|fatal|panic)'
      - labels:
          stream:
          level:
      # Use extracted log content if available, otherwise use original
      - output:
          source: log
