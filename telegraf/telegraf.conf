[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "0s"
  hostname = ""
  omit_hostname = false

###############################################################################
#                            PROCESSOR PLUGINS                                #
###############################################################################

# Extract device MAC from MQTT topic for non-Ruuvi devices
# Topic format: ruuvi/<device_mac>
[[processors.starlark]]
  namepass = ["ble_devices"]
  source = '''
def apply(metric):
    # Check if device_mac tag already has a value
    device_mac = metric.tags.get("device_mac")

    # If device_mac is missing or empty, extract from topic
    if device_mac == None or device_mac == "":
        # Topic might be a tag (default) or a field
        topic = metric.tags.get("topic")
        if topic == None:
            topic = metric.fields.get("topic")

        if topic != None and "/" in topic:
            parts = topic.split("/")
            if len(parts) >= 2 and parts[1] != "gw_status":
                metric.tags["device_mac"] = parts[1]

    # Remove topic tag/field to save space
    metric.tags.pop("topic", None)
    metric.fields.pop("topic", None)

    return metric
'''

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

[[outputs.influxdb_v2]]
  namepass = ["ruuvi"]
  urls = ["http://influxdb3:8181"]
  token = "${INFLUXDB3_AUTH_TOKEN}"
  organization = ""
  bucket = "ruuvi"

[[outputs.influxdb_v2]]
  namepass = ["ble_devices"]
  urls = ["http://influxdb3:8181"]
  token = "${INFLUXDB3_AUTH_TOKEN}"
  organization = ""
  bucket = "ble"

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

# ============================================================================
# BLE Device Tracking (ALL devices including non-Ruuvi)
# Captures all BLE sightings with device MAC and RSSI
# ============================================================================
[[inputs.mqtt_consumer]]
  name_override = "ble_devices"
  servers = ["tcp://mosquitto:1883"]
  client_id = "telegraf_ble_devices"
  topics = ["ruuvi/+"]
  qos = 0
  connection_timeout = "30s"

  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "ble_devices"

    # Device identifier (MAC address) - use 'id' from JSON
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "id"
      optional = true
      rename = "device_mac"

    # Gateway MAC
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "gw_mac"
      optional = true

    # Signal strength
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi"
      type = "int"
      optional = true

    # Timestamp from device
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ts"
      type = "int"
      optional = true

# ============================================================================
# Ruuvi Sensor Data (parsed environmental data from Ruuvi tags)
# ============================================================================
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  client_id = "telegraf_ruuvi_sensors"
  topics = [
    "ruuvi/#",
    "ruuvigw/#"
  ]
  qos = 0
  connection_timeout = "30s"

  # Data format - Ruuvi Gateway sends JSON
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "ruuvi"

    # Environmental fields
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "temperature"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "humidity"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pressure"
      type = "float"
      optional = true

    # Power
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "voltage"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "txPower"
      type = "int"
      optional = true

    # Signal
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi"
      type = "int"
      optional = true

    # Motion
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "accelX"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "accelY"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "accelZ"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "movementCounter"
      type = "int"
      optional = true

    # Counters
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "measurementSequenceNumber"
      type = "int"
      optional = true

    # Air quality (Ruuvi AirQ sensors)
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "CO2"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "VOC"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "NOx"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "PM1.0"
      rename = "PM1_0"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "PM2.5"
      rename = "PM2_5"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "PM4.0"
      rename = "PM4_0"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "PM10.0"
      rename = "PM10_0"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "luminosity"
      type = "float"
      optional = true

    # Tag fields
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "id"
      optional = true
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "gw_mac"
      optional = true
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "dataFormat"
      optional = true
