[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "0s"
  hostname = ""
  omit_hostname = false

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

[[outputs.influxdb_v2]]
  urls = ["http://influxdb3:8181"]
  token = "${INFLUXDB3_AUTH_TOKEN}"
  organization = ""
  bucket = "ruuvi"

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "ruuvi/#",
    "ruuvigw/#"
  ]
  qos = 0
  connection_timeout = "30s"

  # Data format - Ruuvi Gateway sends JSON
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "ruuvi"

    # Environmental fields
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "temperature"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "humidity"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pressure"
      type = "float"
      optional = true

    # Power
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "voltage"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "txPower"
      type = "int"
      optional = true

    # Signal
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi"
      type = "int"
      optional = true

    # Motion
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "accelX"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "accelY"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "accelZ"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "movementCounter"
      type = "int"
      optional = true

    # Counters
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "measurementSequenceNumber"
      type = "int"
      optional = true

    # Air quality (Ruuvi AirQ sensors)
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "CO2"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "VOC"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "NOx"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "PM1.0"
      rename = "PM1_0"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "PM2.5"
      rename = "PM2_5"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "PM4.0"
      rename = "PM4_0"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "PM10.0"
      rename = "PM10_0"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "luminosity"
      type = "float"
      optional = true

    # Tag fields
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "id"
      optional = true
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "gw_mac"
      optional = true
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "dataFormat"
      optional = true
