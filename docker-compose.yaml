# Create a docker-compose.yml file with the following content:
#  - influxdb2 database
#  - grafana 
#  -  grafana loki server
# Add grafana configuration to use loki as datasource
# Add grafana configuration to use github oauth



services:
  influxdb:
    container_name: influxdb
    image: influxdb:2.7.12-alpine
    volumes:
      - influxdb-lib:/var/lib/influxdb2
    env_file:
      # BE SURE TO CHANGE THIS LINE BEFORE GOING TO PRODUCTION
      - ./influx2.env
    ports:
      - 8086:8086
    restart: always

  grafana:
    container_name: grafana
    image: grafana/grafana-oss:12.3.1
    volumes:
      # Note: The 'ro' option specifies that the volume is mounted in read-only mode.
      # However, certain files such as grafana.ini may require write access. Be mindful of security implications when removing ':ro'.
      # Docs : https://docs.docker.com/compose/compose-file/compose-file-v3/#short-syntax-3
      - ./grafana/etc:/etc/grafana:ro
      - grafana-lib:/var/lib/grafana
      - grafana-log:/var/log/grafana
    env_file:
      # BE SURE TO CHANGE THIS LINE BEFORE GOING TO PRODUCTION
      - ./grafana.env
    ports:
      - 3000:3000
    depends_on:
      - influxdb
    restart: always

  loki:
    container_name: loki
    image: grafana/loki:3.3.2
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/etc:/etc/loki:ro
      - loki-data:/loki
    ports:
      - 3100:3100
    restart: always

  influxdb3:
    container_name: influxdb3
    image: influxdb:3-core
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3
      - --query-file-limit=10000
    volumes:
      - influxdb3-data:/var/lib/influxdb3
    ports:
      - 8181:8181
    restart: always

  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:2
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    ports:
      - 1883:1883
      - 9001:9001
    restart: always

  telegraf:
    container_name: telegraf
    image: telegraf:1.33-alpine
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    env_file:
      - ./influx3.env
    depends_on:
      - mosquitto
      - influxdb3
    restart: always

  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - "192.168.1.111:53:53/tcp"
      - "192.168.1.111:53:53/udp"
      - 8053:80
    environment:
      TZ: Europe/Helsinki
      FTLCONF_webserver_api_password: admin
      FTLCONF_dns_listeningMode: all
      FTLCONF_dns_upstreams: 193.229.0.40;193.229.0.42
      FTLCONF_dns_hosts: 192.168.1.111 grafana.home;192.168.1.111 pihole.home;192.168.1.111 influxdb.home;192.168.1.111 loki.home;192.168.1.111 huoltokirja.home
    volumes:
      - pihole-etc:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d
    restart: always

  caddy:
    container_name: caddy
    image: caddy:2-alpine
    ports:
      - 80:80
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    depends_on:
      - grafana
      - pihole
    restart: always

  huoltokirja:
    container_name: huoltokirja
    image: ghcr.io/frogshead/huoltokirja:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://huoltokirja:huoltokirja@huoltokirja-db:5432/huoltokirja
      UPLOADS_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: 50
    volumes:
      - huoltokirja-uploads:/app/uploads
    depends_on:
      huoltokirja-db:
        condition: service_healthy
    restart: always

  huoltokirja-db:
    container_name: huoltokirja-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: huoltokirja
      POSTGRES_PASSWORD: huoltokirja
      POSTGRES_DB: huoltokirja
    volumes:
      - huoltokirja-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U huoltokirja"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  promtail:
    container_name: promtail
    image: grafana/promtail:3.3.2
    volumes:
      - ./promtail/promtail.yaml:/etc/promtail/promtail.yaml:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail.yaml
    depends_on:
      - loki
    restart: always

volumes:
  influxdb-lib:
    external: false

  grafana-lib:
    external: false

  grafana-log:
    external: false

  loki-data:
    external: false

  influxdb3-data:
    external: false

  mosquitto-data:
    external: false

  mosquitto-log:
    external: false

  pihole-etc:
    external: false

  pihole-dnsmasq:
    external: false

  caddy-data:
    external: false

  huoltokirja-postgres:
    external: false

  huoltokirja-uploads:
    external: false